  // ── Firestore REST (proven encoding, lifted from Firehawk Ops) ──────────────
  function toFSVal(v) {
    if (v === null || v === undefined) return { nullValue: null };
    if (typeof v === "boolean") return { booleanValue: v };
    if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
    if (typeof v === "string") return { stringValue: v };
    if (Array.isArray(v)) return { arrayValue: { values: v.map(toFSVal) } };
    if (typeof v === "object") return { mapValue: { fields: toFSFields(v) } };
    return { stringValue: String(v) };
  }
  function toFSFields(obj) {
    const out = {};
    Object.keys(obj).forEach(k => { out[k] = toFSVal(obj[k]); });
    return out;
  }
  function fromFSVal(v) {
    if (!v) return null;
    if ("stringValue" in v) return v.stringValue;
    if ("integerValue" in v) return parseInt(v.integerValue);
    if ("doubleValue" in v) return v.doubleValue;
    if ("booleanValue" in v) return v.booleanValue;
    if ("nullValue" in v) return null;
    if ("arrayValue" in v) return (v.arrayValue.values || []).map(fromFSVal);
    if ("mapValue" in v) return fromFSFields(v.mapValue.fields || {});
    return null;
  }
  function fromFSFields(fields) {
    const out = {};
    Object.keys(fields || {}).forEach(k => { out[k] = fromFSVal(fields[k]); });
    return out;
  }
  function fsErr(t) {
    try { const j = JSON.parse(t); return (j.error && j.error.message) || (t || "").slice(0, 140); }
    catch (e) { return (t || "").slice(0, 140); }
  }
  async function fsGet(col, doc) {
    if (!BACKEND_ON) return null;
    try {
      const res = await fetch(FS_BASE + "/" + col + "/" + doc + "?key=" + FS_API_KEY, { headers: { "Accept": "application/json" } });
      if (res.status === 404) return null;            // doc genuinely missing
      if (!res.ok) return undefined;                   // 403/5xx = unreachable, NOT missing
      const data = await res.json();
      return data.fields ? fromFSFields(data.fields) : null;
    } catch (e) { return undefined; }                  // network failure = unreachable
  }
  function fpSeg(seg) { return /^[A-Za-z_][A-Za-z0-9_]*$/.test(seg) ? seg : "`" + String(seg).replace(/[`\\]/g, "\\$&") + "`"; }
  async function fsUpdate(col, doc, obj, fieldPaths) {
    if (!BACKEND_ON) return { ok: false, status: 0, detail: "backend not configured" };
    try {
      const mask = (fieldPaths || []).map(fp => "updateMask.fieldPaths=" + encodeURIComponent(fp)).join("&");
      const url = FS_BASE + "/" + col + "/" + doc + "?" + (mask ? mask + "&" : "") + "key=" + FS_API_KEY;
      const res = await fetch(url, { method: "PATCH", headers: { "Content-Type": "application/json", "Accept": "application/json" }, body: JSON.stringify({ fields: toFSFields(obj) }) });
      if (!res.ok) { const t = await res.text(); console.error("fsUpdate FAIL", res.status, t.slice(0, 300)); return { ok: false, status: res.status, detail: fsErr(t) }; }
      return { ok: true, status: res.status, detail: "" };
    } catch (e) { console.error("fsUpdate ERROR", e.message); return { ok: false, status: 0, detail: e.message || "network error" }; }
  }
  // Resilient poll listener — fires on FIRST poll even on error/null so sync resolves.
  function fsListen(col, doc, callback) {
    let active = true, lastSig = "", firstPoll = true;
    const poll = async () => {
      if (!active) return;
      let data = null;
      try { data = await fsGet(col, doc); } catch (e) { data = undefined; }
      const sig = JSON.stringify(data);
      if (firstPoll || sig !== lastSig) { firstPoll = false; lastSig = sig; try { callback(data); } catch (e) {} }
      if (active) setTimeout(poll, 5000);
    };
    poll();
    return () => { active = false; };
  }

  // ── Roster storage model (keyed map + order — atomic per-member patches) ────
  function memberShape(c) {

      taskbooks: Array.isArray(c.taskbooks) ? c.taskbooks.map(tbShape) : [],

  function tbShape(t) {
    return { pos: t.pos || "", opened: t.opened || null, status: t.status === "closed" ? "closed" : "open", closed: t.closed || null };

    if (data && data.membersById && typeof data.membersById === "object") {

      const order = Array.isArray(data.memberOrder) ? data.memberOrder.map(String) : [];
      const seen = {}, out = [];
      order.forEach(id => { if (byId[id] && !seen[id]) { seen[id] = 1; out.push(byId[id]); } });
      Object.keys(byId).forEach(id => { if (!seen[id]) out.push(byId[id]); });
      return out.map(normalizeMember);
    }
    return [];
  }

  // ════════════════════════════════════════════════════════════════════════════
  // WEATHER ALERT DOCTRINE
  //   Every product the Wildland team cares about, grouped and color-coded.
  //   Fail-silent per source on the banners (they only ever ADD warnings, never
  //   clear a known state) — but the Weather page itself fails LOUD.
  // ════════════════════════════════════════════════════════════════════════════
  const ALERT_GROUPS = [
    { key:"fire",  hue:C.red,    icon:"🚩", events:["Red Flag Warning"] },                                     // dedicated /redflag endpoint handles this; kept for NWS-feed redundancy
    { key:"firewx",hue:C.fire,   icon:"🔥", events:["Fire Weather Watch","Extreme Fire Danger"] },
    { key:"heat",  hue:C.amber,  icon:"🌡️", events:["Excessive Heat Warning","Heat Advisory","Excessive Heat Watch","Extreme Heat Warning","Extreme Heat Watch"] },
    { key:"wind",  hue:"#B39DDB",icon:"💨", events:["High Wind Warning","Wind Advisory","High Wind Watch","Dust Storm Warning","Blowing Dust Advisory"] },
    { key:"storm", hue:"#FF8FA3",icon:"⛈️", events:["Tornado Warning","Severe Thunderstorm Warning","Tornado Watch","Severe Thunderstorm Watch"] },
    { key:"flood", hue:"#4A90D9",icon:"🚧", events:["Flash Flood Warning","Flood Warning","Flash Flood Watch","Flood Watch","Flash Flood Statement"] }
  ];
  function classifyAlerts(features) {
    // returns [{group, event, ends, headline}] — one entry per matched alert, group-ordered
    const out = [];
    ALERT_GROUPS.forEach(g => {
      (features || []).forEach(f => {
        const p = f && f.properties;
        if (!p || g.events.indexOf(p.event) === -1) return;
        out.push({ group: g, event: p.event, ends: p.ends || p.expires || null, headline: p.headline || "" });
      });
    });
    // dedup identical events, keep first (earliest listed = highest group priority)
    const seen = {}; return out.filter(a => { const k = a.event; if (seen[k]) return false; seen[k] = 1; return true; });
  }
  const fmtWxTime = (iso) => { if (!iso) return ""; try { return new Date(iso).toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" }); } catch (e) { return ""; } };
  const fmtUntil  = (iso) => { if (!iso) return "further notice"; try { const d = new Date(iso); return d.toLocaleString("en-US", { weekday:"short", hour:"numeric", minute:"2-digit" }); } catch (e) { return "further notice"; } };

  // ════════════════════════════════════════════════════════════════════════════
  // WEATHER VIEW — NWS gridpoint (official/primary). Fire-weather emphasis:
  //   RH, wind, gusts front and center. No source → loud "UNAVAILABLE", never blank.
  // ════════════════════════════════════════════════════════════════════════════
  function WeatherView({ alerts, burnBan, redFlag }) {
    const [state, setState] = useState({ status:"loading" });   // loading | ok | error
    const [hourly, setHourly] = useState(null);                 // null = unavailable (shown as such)
    useEffect(() => {
      let dead = false;
      const load = async () => {
        try {
          const pr = await fetch("https://api.weather.gov/points/" + REF.lat + "," + REF.lon);
          if (!pr.ok) throw new Error("points HTTP " + pr.status);
          const pj = await pr.json();
          const fUrl = pj && pj.properties && pj.properties.forecast;
          const hUrl = pj && pj.properties && pj.properties.forecastHourly;
          if (!fUrl) throw new Error("no forecast URL in points response");
          const fr = await fetch(fUrl);
          if (!fr.ok) throw new Error("forecast HTTP " + fr.status);
          const fj = await fr.json();
          const periods = fj && fj.properties && fj.properties.periods;
          if (!Array.isArray(periods) || !periods.length) throw new Error("empty forecast periods");
          if (!dead) setState({ status:"ok", periods: periods.slice(0, 8), updated: new Date().toISOString() });
          if (hUrl) {
            try {
              const hr = await fetch(hUrl);
              if (hr.ok) {
                const hj = await hr.json();
                const hp = hj && hj.properties && hj.properties.periods;
                if (!dead && Array.isArray(hp) && hp.length) setHourly(hp.slice(0, 12));
              }
            } catch (e) {}   // hourly is enrichment; the 12-h forecast is the product
          }
        } catch (e) {
          if (!dead) setState({ status:"error", detail: e.message || "fetch failed" });
        }
      };
      load(); const t = setInterval(load, 1800000);
      return () => { dead = true; clearInterval(t); };
    }, []);

    const card = (kids, style) => h("div", { style: Object.assign({ background:C.panel, border:"1px solid "+C.border, borderRadius:12, padding:"12px 14px", marginBottom:10 }, style || {}) }, kids);
    const rh = (p) => (p.relativeHumidity && p.relativeHumidity.value != null) ? p.relativeHumidity.value + "%" : "—";

    return h("div", null,
      // Fire-danger status strip — the two wildland-critical flags, always visible with an honest state
      card(h("div", { style:{ display:"flex", gap:10 } },
        [["RED FLAG", redFlag, redFlag == null ? null : !!redFlag.active, "NWS"],
         ["BURN BAN", burnBan, burnBan == null ? null : !!burnBan.underBan, "TFS"]].map(([label, raw, on, src]) =>
          h("div", { key: label, style:{ flex:1, textAlign:"center", padding:"10px 6px", borderRadius:10,
            border:"1px solid " + (on === null ? C.border : on ? "rgba(255,59,48,0.5)" : "rgba(52,199,89,0.4)"),
            background: on === null ? C.panel2 : on ? "rgba(255,59,48,0.12)" : "rgba(52,199,89,0.08)" } },
            h("div", { style:{ fontSize:11, fontWeight:700, letterSpacing:1.5, color: on === null ? C.dim : on ? C.red : C.green } },
              on === null ? label + " — UNVERIFIED" : on ? label + " ACTIVE" : "NO " + label),
            h("div", { style:{ fontSize:8, color:C.dim, marginTop:3, letterSpacing:0.5 } },
              on === null ? "source unreachable — verify before ops" : src + (raw && raw.updated ? " · " + fmtWxTime(raw.updated) : ""))))),
        { padding:"10px" }),

      // Active NWS alerts (full list — banners up top show the same set)
      alerts && alerts.length ? card(alerts.map((a, i) =>
        h("div", { key:i, style:{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom: i < alerts.length-1 ? "1px solid "+C.border : "none" } },
          h("span", { style:{ fontSize:14 } }, a.group.icon),
          h("div", null,
            h("div", { style:{ fontSize:11, fontWeight:700, color:a.group.hue, letterSpacing:0.8 } }, a.event.toUpperCase()),
            h("div", { style:{ fontSize:9, color:C.dim, marginTop:1 } }, "until " + fmtUntil(a.ends)))))) : null,

      // Next 12 hours — fire weather strip (RH / wind / gust)
      card([
        h("div", { key:"t", style:{ fontSize:10, letterSpacing:1.5, color:C.dim, marginBottom:8 } }, "NEXT 12 HOURS · RH / WIND"),
        hourly === null
          ? h("div", { key:"na", style:{ fontSize:10, color:C.amber } }, state.status === "loading" ? "Loading…" : "HOURLY DATA UNAVAILABLE — verify at weather.gov")
          : h("div", { key:"strip", style:{ display:"flex", overflowX:"auto", gap:6, paddingBottom:4 } },
              hourly.map((p, i) => {
                const rhv = (p.relativeHumidity && p.relativeHumidity.value != null) ? p.relativeHumidity.value : null;
                const rhHue = rhv == null ? C.dim : rhv <= 20 ? C.red : rhv <= 30 ? C.amber : C.green;
                return h("div", { key:i, style:{ minWidth:56, textAlign:"center", background:C.panel2, border:"1px solid "+C.border, borderRadius:8, padding:"7px 4px" } },
                  h("div", { style:{ fontSize:9, color:C.dim } }, new Date(p.startTime).toLocaleTimeString("en-US",{hour:"numeric"})),
                  h("div", { style:{ fontSize:13, fontWeight:700, marginTop:2 } }, p.temperature + "°"),
                  h("div", { style:{ fontSize:10, fontWeight:700, color:rhHue, marginTop:2 } }, rhv == null ? "—" : rhv + "%"),
                  h("div", { style:{ fontSize:8, color:C.dim, marginTop:2 } }, (p.windSpeed || "—") + " " + (p.windDirection || "")));
              }))
      ]),

      // 12-hour period forecast
      state.status === "error"
        ? card(h("div", { style:{ textAlign:"center", padding:"10px 0" } },
            h("div", { style:{ fontSize:12, fontWeight:700, color:C.red, letterSpacing:1 } }, "⚠️ FORECAST UNAVAILABLE"),
            h("div", { style:{ fontSize:9, color:C.dim, marginTop:4 } }, "NWS gridpoint failed (" + state.detail + ") — verify conditions at weather.gov before operations")))
        : state.status === "loading"
          ? card(h("div", { style:{ fontSize:11, color:C.dim, textAlign:"center", padding:"8px 0" } }, "Loading NWS forecast…"))
          : card(state.periods.map((p, i) =>
              h("div", { key:i, style:{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom: i < state.periods.length-1 ? "1px solid "+C.border : "none" } },
                h("div", { style:{ width:74, flexShrink:0 } },
                  h("div", { style:{ fontSize:10, fontWeight:700, letterSpacing:0.5 } }, p.name),
                  h("div", { style:{ fontSize:12, fontWeight:700, color: p.isDaytime ? C.amber : C.blue, marginTop:2 } }, p.temperature + "°" + p.temperatureUnit)),
                h("div", { style:{ minWidth:0 } },
                  h("div", { style:{ fontSize:10, color:C.text } }, p.shortForecast),
                  h("div", { style:{ fontSize:9, color:C.dim, marginTop:2 } },
                    "RH " + rh(p) + " · " + (p.windSpeed || "—") + " " + (p.windDirection || "") +
                    (p.probabilityOfPrecipitation && p.probabilityOfPrecipitation.value ? " · " + p.probabilityOfPrecipitation.value + "% precip" : ""))))).concat([
              h("div", { key:"src", style:{ fontSize:8, color:C.dim, textAlign:"right", marginTop:6, letterSpacing:0.5 } }, "NWS GRIDPOINT · " + fmtWxTime(state.updated))
            ]))
    );
  }

  // ════════════════════════════════════════════════════════════════════════════
  // ROSTER VIEW — grouped by shift (A/B/C) · qual chips · taskbook status
  //   Admins edit via modal; per-member atomic patches (same doctrine as Firehawk).
  // ════════════════════════════════════════════════════════════════════════════
  function MemberEditModal({ member, crew, saveCrew, onClose, flash }) {
    const isNew = !member;
    const nextId = crew.reduce((m, c) => Math.max(m, c.id), 0) + 1;
    const [f, setF] = useState(member ? JSON.parse(JSON.stringify(member)) : {
      id: nextId, name:"", first:"", rank:"FF", shift:"A", tier:"staff", hasPin:false,
      heavy:true, quals:[], taskbooks:[], archived:false });
    const [tbPos, setTbPos] = useState(TB_POSITIONS[0]);
    const set = (k, v) => setF(p => ({ ...p, [k]: v }));
    const toggleQual = (code) => setF(p => ({ ...p, quals: p.quals.indexOf(code) !== -1 ? p.quals.filter(q => q !== code) : p.quals.concat([code]) }));
    const openTb = () => {
      if (f.taskbooks.some(t => t.pos === tbPos && t.status === "open")) { flash("Taskbook already open for " + tbPos); return; }
      set("taskbooks", f.taskbooks.concat([{ pos: tbPos, opened: new Date().toISOString().slice(0,10), status:"open", closed:null }]));
    };
    const closeTb = (idx) => set("taskbooks", f.taskbooks.map((t, i) => i === idx ? { ...t, status:"closed", closed: new Date().toISOString().slice(0,10) } : t));
    const removeTb = (idx) => set("taskbooks", f.taskbooks.filter((_, i) => i !== idx));
    const save = async () => {
      if (!f.name.trim()) { flash("Last name required"); return; }
      const updated = isNew ? crew.concat([f]) : crew.map(c => c.id === f.id ? f : c);
      const res = await saveCrew(updated);
      if (res.ok) { flash(isNew ? "Member added" : "Saved"); onClose(); }
      else flash("Save failed — see error");
    };
    const inp = (style) => Object.assign({ background:C.panel2, border:"1px solid "+C.border, borderRadius:8, color:C.text, padding:"8px 10px", fontSize:13, width:"100%" }, style || {});
    const lbl = (t) => h("div", { style:{ fontSize:9, letterSpacing:1.2, color:C.dim, margin:"10px 0 4px" } }, t);
    return h("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:60, display:"flex", alignItems:"flex-start", justifyContent:"center", overflowY:"auto", padding:"30px 12px" }, onClick: onClose },
      h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:14, padding:16, width:"100%", maxWidth:420 }, onClick: e => e.stopPropagation() },
        h("div", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:1, marginBottom:4 } }, isNew ? "ADD MEMBER" : "EDIT — " + (f.first ? f.first + " " : "") + f.name),
        h("div", { style:{ display:"flex", gap:8 } },
          h("div", { style:{ flex:1 } }, lbl("FIRST"), h("input", { style: inp(), value:f.first, onChange:e => set("first", e.target.value) })),
          h("div", { style:{ flex:1 } }, lbl("LAST"), h("input", { style: inp(), value:f.name, onChange:e => set("name", e.target.value) }))),
        h("div", { style:{ display:"flex", gap:8 } },
          h("div", { style:{ flex:1 } }, lbl("RANK"), h("select", { style: inp(), value:f.rank, onChange:e => set("rank", e.target.value) },
            ["FF","Eng","Lt","Capt","BC","Chief","Mech"].map(r => h("option", { key:r, value:r }, r)))),
          h("div", { style:{ flex:1 } }, lbl("SHIFT"), h("select", { style: inp(), value:f.shift, onChange:e => set("shift", e.target.value) },
            ROSTER_GROUPS.map(s => h("option", { key:s, value:s }, s === "ADM" ? "Admin" : s + " Shift")))),
          h("div", { style:{ flex:1 } }, lbl("ACCESS"), h("select", { style: inp(), value:f.tier, onChange:e => set("tier", e.target.value) },
            [["staff","Staff"],["admin","Admin"],["owner","Owner"]].map(([v,l]) => h("option", { key:v, value:v }, l))))),
        h("div", { style:{ display:"flex", alignItems:"center", gap:8, marginTop:12 } },
          h("button", { onClick:() => set("heavy", !f.heavy),
            style:{ fontSize:10, fontWeight:700, letterSpacing:0.8, padding:"5px 12px", borderRadius:12,
              border:"1px solid " + (f.heavy ? C.accent : C.border), background: f.heavy ? "rgba(139,195,74,0.18)" : C.panel2, color: f.heavy ? C.accent : C.dim } },
            (f.heavy ? "✓ " : "") + "HEAVY EQUIPMENT TEAM")),
        lbl("QUALIFICATIONS"),
        QUAL_CATS.map(([cat, catLabel]) =>
          h("div", { key:cat, style:{ marginBottom:6 } },
            h("div", { style:{ fontSize:8, letterSpacing:1.2, color:C.dim, margin:"4px 0 4px" } }, catLabel),
            h("div", { style:{ display:"flex", flexWrap:"wrap", gap:6 } },
              QUALS.filter(q => q.cat === cat).map(q => {
                const on = f.quals.indexOf(q.code) !== -1;
                return h("button", { key:q.code, onClick:() => toggleQual(q.code), title:q.label,
                  style:{ fontSize:10, fontWeight:700, letterSpacing:0.5, padding:"4px 9px", borderRadius:12,
                    border:"1px solid " + (on ? C.accent : C.border), background: on ? "rgba(139,195,74,0.18)" : C.panel2, color: on ? C.accent : C.dim } }, q.code);
              })))),
        lbl("ANNUAL CURRENCY"),
        h("div", { style:{ display:"flex", gap:8 } },
          h("div", { style:{ flex:1 } }, lbl("WCT LEVEL"), h("select", { style: inp(), value:f.wctLevel || "", onChange:e => set("wctLevel", e.target.value || null) },
            [["","\u2014"],["A","Arduous"],["M","Moderate"],["L","Light"]].map(([v,l]) => h("option", { key:v, value:v }, l)))),
          h("div", { style:{ flex:1 } }, lbl("WCT DATE"), h("input", { type:"date", style: inp(), value:f.wctDate || "", onChange:e => set("wctDate", e.target.value || null) })),
          h("div", { style:{ flex:1 } }, lbl("WCT TIME"), h("input", { placeholder:"45:00", style: inp(), value:f.wctTime || "", onChange:e => set("wctTime", e.target.value || null) }))),
        h("div", { style:{ display:"flex", gap:8 } },
          h("div", { style:{ flex:1 } }, lbl("RT-130 REFRESHER"), h("input", { type:"date", style: inp(), value:f.refresherDate || "", onChange:e => set("refresherDate", e.target.value || null) })),
          h("div", { style:{ flex:1 } }, lbl("FIRE SHELTER"), h("input", { type:"date", style: inp(), value:f.shelterDate || "", onChange:e => set("shelterDate", e.target.value || null) }))),
        lbl("TASKBOOKS"),
        f.taskbooks.length === 0 ? h("div", { style:{ fontSize:10, color:C.dim, marginBottom:6 } }, "None on record") :
          h("div", null, f.taskbooks.map((t, i) =>
            h("div", { key:i, style:{ display:"flex", alignItems:"center", gap:8, padding:"5px 0", fontSize:11 } },
              h("span", { style:{ fontWeight:700, width:44 } }, t.pos),
              h("span", { style:{ fontSize:9, color: t.status === "open" ? C.amber : C.green, letterSpacing:1 } },
                t.status === "open" ? "OPEN · since " + (t.opened || "?") : "CLOSED · " + (t.closed || "?")),
              h("span", { style:{ flex:1 } }),
              t.status === "open" ? h("button", { onClick:() => closeTb(i), style:{ fontSize:9, padding:"3px 8px", borderRadius:8, border:"1px solid rgba(52,199,89,0.4)", background:"rgba(52,199,89,0.12)", color:C.green } }, "Close") : null,
              h("button", { onClick:() => removeTb(i), style:{ fontSize:9, padding:"3px 8px", borderRadius:8, border:"1px solid "+C.border, background:"none", color:C.dim } }, "✕")))),
        h("div", { style:{ display:"flex", gap:8, marginTop:4 } },
          h("select", { style: inp({ flex:1 }), value:tbPos, onChange:e => setTbPos(e.target.value) },
            TB_POSITIONS.map(p => h("option", { key:p, value:p }, p))),
          h("button", { onClick: openTb, style:{ fontSize:11, padding:"8px 14px", borderRadius:8, border:"1px solid "+C.accent, background:"rgba(139,195,74,0.14)", color:C.accent, whiteSpace:"nowrap" } }, "Open Taskbook")),
        h("div", { style:{ display:"flex", alignItems:"center", gap:8, marginTop:14 } },
          !isNew ? h("button", { onClick:() => set("archived", !f.archived),
            style:{ fontSize:10, padding:"8px 12px", borderRadius:8, border:"1px solid "+C.border, background:"none", color: f.archived ? C.green : C.amber } },
            f.archived ? "Unarchive" : "Archive") : null,
          h("span", { style:{ flex:1 } }),
          h("button", { onClick: onClose, style:{ fontSize:11, padding:"9px 16px", borderRadius:8, border:"1px solid "+C.border, background:"none", color:C.dim } }, "Cancel"),
          h("button", { onClick: save, style:{ fontSize:11, fontWeight:700, padding:"9px 18px", borderRadius:8, border:"1px solid "+C.accent, background:"rgba(139,195,74,0.2)", color:C.accent } }, "Save"))));
  }

  function RosterView({ crew, canEdit, saveCrew, flash }) {
    const [editing, setEditing] = useState(null);   // member object | "new" | null
    const active = crew.filter(c => !c.archived);
    const openTbCount = (c) => c.taskbooks.filter(t => t.status === "open").length;
    return h("div", null,
      canEdit ? h("div", { style:{ display:"flex", justifyContent:"flex-end", marginBottom:10 } },
        h("button", { onClick:() => setEditing("new"), style:{ fontSize:11, fontWeight:700, padding:"8px 14px", borderRadius:9, border:"1px solid "+C.accent, background:"rgba(139,195,74,0.14)", color:C.accent } }, "+ Add Member")) : null,
      ROSTER_GROUPS.map(sh => {
        const sc = SHIFT_COLORS[sh];
        const members = active.filter(c => c.shift === sh);
        return h("div", { key:sh, style:{ marginBottom:14 } },
          h("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:8 } },
            h("span", { style:{ fontSize:13, fontWeight:700, letterSpacing:1.5, color:sc.color, background:sc.bg, border:"1px solid "+sc.border, borderRadius:6, padding:"2px 10px" } }, GROUP_LABEL(sh)),
            h("span", { style:{ fontSize:9, color:C.dim, letterSpacing:1 } }, members.length + (members.length === 1 ? " MEMBER" : " MEMBERS"))),
          members.length === 0
            ? h("div", { style:{ fontSize:10, color:C.dim, padding:"6px 2px 2px" } }, "No members assigned")
            : members.map(c =>
                h("div", { key:c.id, onClick: canEdit ? () => setEditing(c) : undefined,
                  style:{ background:C.panel, border:"1px solid "+C.border, borderLeft:"3px solid "+sc.color, borderRadius:10, padding:"10px 12px", marginBottom:7, cursor: canEdit ? "pointer" : "default" } },
                  h("div", { style:{ display:"flex", alignItems:"center", gap:8 } },
                    h("span", { style:{ fontSize:13, fontWeight:600 } }, (c.first ? c.first + " " : "") + c.name),
                    h("span", { style:{ fontSize:9, color:C.dim, letterSpacing:1 } }, c.rank),
                    c.heavy ? h("span", { title:"Heavy Equipment Team", style:{ fontSize:8, fontWeight:700, letterSpacing:0.8, color:C.accent, border:"1px solid rgba(139,195,74,0.4)", background:"rgba(139,195,74,0.08)", borderRadius:10, padding:"2px 7px" } }, "HE") : null,
                    h("span", { style:{ flex:1 } }),
                    openTbCount(c) ? h("span", { style:{ fontSize:8, fontWeight:700, letterSpacing:0.8, color:C.amber, border:"1px solid rgba(255,193,7,0.4)", background:"rgba(255,193,7,0.1)", borderRadius:10, padding:"2px 7px" } }, openTbCount(c) + " TB OPEN") : null),
                  h("div", { style:{ display:"flex", flexWrap:"wrap", gap:5, marginTop:7 } },
                    c.quals.length === 0 ? h("span", { style:{ fontSize:9, color:C.dim } }, "No quals recorded")
                      : c.quals.map(q => h("span", { key:q, title: QUAL_BY_CODE[q] || q,
                          style:{ fontSize:9, fontWeight:700, letterSpacing:0.5, padding:"2px 8px", borderRadius:10, border:"1px solid "+C.border, background:C.panel2, color:C.text } }, q))),
                  currencyRow(c))));
      }),
      crew.some(c => c.archived) ? h("div", { style:{ fontSize:9, color:C.dim, marginTop:4 } },
        "Archived: " + crew.filter(c => c.archived).map(c => c.name).join(", ") + (canEdit ? " — tap a shift member above to edit; archived members restore via Firestore console or Add Member with same ID" : "")) : null,
      editing ? h(MemberEditModal, { member: editing === "new" ? null : editing, crew, saveCrew, onClose:() => setEditing(null), flash }) : null);
  }

  // ════════════════════════════════════════════════════════════════════════════
  // HEAVY EQUIPMENT VIEW — per-shift operator coverage for each asset.
  //   Derived live from roster quals. Coverage: 0 = RED, 1 = AMBER, 2+ = GREEN.
  // ════════════════════════════════════════════════════════════════════════════
  function EquipmentView({ crew }) {
    const active = crew.filter(c => !c.archived);
    const today = todayShift();
    return h("div", null,
      h("div", { style:{ fontSize:9, color:C.dim, letterSpacing:1, marginBottom:10 } },
        "OPERATOR COVERAGE BY SHIFT · DERIVED FROM ROSTER QUALS · TODAY = " + today + " SHIFT"),
      EQUIPMENT.map(eq => {
        return h("div", { key:eq.id, style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:12, padding:"12px 14px", marginBottom:10 } },
          h("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:10 } },
            h("span", { style:{ fontSize:16 } }, eq.icon),
            h("span", { style:{ fontSize:13, fontWeight:700, letterSpacing:0.5 } }, eq.name),
            h("span", { style:{ fontSize:9, color:C.dim, letterSpacing:1 } }, "· " + eq.qual)),
          h("div", { style:{ display:"flex", gap:8 } },
            SHIFTS.map(sh => {
              const ops = active.filter(c => c.shift === sh && c.quals.indexOf(eq.qual) !== -1);
              const hue = ops.length >= 2 ? C.green : ops.length === 1 ? C.amber : C.red;
              const sc = SHIFT_COLORS[sh];
              const isToday = sh === today;
              return h("div", { key:sh, style:{ flex:1, borderRadius:10, padding:"8px 8px",
                border:"1px solid " + (isToday ? sc.border : C.border),
                background: isToday ? sc.bg : C.panel2 } },
                h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between" } },
                  h("span", { style:{ fontSize:10, fontWeight:700, color:sc.color, letterSpacing:1 } }, sh + (isToday ? " · TODAY" : "")),
                  h("span", { style:{ fontSize:12, fontWeight:800, color:hue } }, ops.length)),
                h("div", { style:{ fontSize:9, color: ops.length ? C.text : hue, marginTop:4, lineHeight:1.5 } },
                  ops.length ? ops.map(o => o.name).join(", ") : "NO OPERATOR"));
            })));
      }),
      h("div", { style:{ fontSize:8, color:C.dim, letterSpacing:0.5, marginTop:2 } },
        "Coverage color: 2+ operators green · 1 amber · 0 red. Staff an asset by adding its qual (DZOP / TTOP / SKOP) on the Roster page."));
  }

  // ════════════════════════════════════════════════════════════════════════════
  // LINKS VIEW — wildland field references
  // ════════════════════════════════════════════════════════════════════════════

  function LinksView() {
    return h("div", null, LINKS.map(g =>
      h("div", { key:g.group, style:{ marginBottom:14 } },
        h("div", { style:{ fontSize:10, letterSpacing:1.5, color:C.dim, marginBottom:8 } }, g.group),
        g.items.map(l =>
          h("a", { key:l.url, href:l.url, target:"_blank", rel:"noopener",
            style:{ display:"block", background:C.panel, border:"1px solid "+C.border, borderRadius:10, padding:"11px 13px", marginBottom:7, textDecoration:"none" } },

            h("div", { style:{ fontSize:9, color:C.dim, marginTop:3 } }, l.desc))))));
  }

  function PinModal({ onSubmit, onClose, error }) {
    const [val, setVal] = useState("");
    return h("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:70, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }, onClick:onClose },
      h("div", { style:{ background:C.panel, border:"1px solid "+C.border, borderRadius:14, padding:20, width:"100%", maxWidth:300, textAlign:"center" }, onClick:e => e.stopPropagation() },
        h("div", { style:{ fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:1.5, marginBottom:12 } }, "ENTER PIN"),
        h("input", { type:"password", inputMode:"numeric", autoFocus:true, value:val,
          onChange:e => setVal(e.target.value),
          onKeyDown:e => { if (e.key === "Enter") onSubmit(val); },
          style:{ width:"100%", textAlign:"center", fontSize:22, letterSpacing:8, background:C.panel2, border:"1px solid "+(error ? C.red : C.border), borderRadius:10, color:C.text, padding:"10px 0" } }),
        error ? h("div", { style:{ fontSize:10, color:C.red, marginTop:8 } }, "Invalid PIN or auth unavailable") : null,
        h("button", { onClick:() => onSubmit(val), style:{ marginTop:14, width:"100%", padding:"11px 0", fontSize:12, fontWeight:700, letterSpacing:1, borderRadius:10, border:"1px solid "+C.accent, background:"rgba(139,195,74,0.18)", color:C.accent } }, "SIGN IN")));
  }

  function App() {
    const [crew, setCrew] = useState([]);
    const crewRef = useRef(crew); crewRef.current = crew;
    const sawByIdRef = useRef(false);
    const migratedRef = useRef(false);
    const [sync, setSync] = useState(BACKEND_ON ? "connecting" : "local");
    const [topTab, setTopTab] = useState("weather");
    const [toast, setToast] = useState("");
    const [lastErr, setLastErr] = useState("");
    const [burnBan, setBurnBan] = useState(null);
    const [redFlag, setRedFlag] = useState(null);
    const [alerts, setAlerts] = useState([]);       // classified NWS alerts
    const [alertsOk, setAlertsOk] = useState(null); // null=pending, true/false = feed health
    const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

    // ── auth (PIN → worker → roster tier) ──
    const [authId, setAuthId] = useState(() => { try { const s = localStorage.getItem("wildland_session"); return s ? Number(s) : null; } catch (e) { return null; } });
    const [showPin, setShowPin] = useState(false);
    const [pinError, setPinError] = useState(false);
    useEffect(() => { try { if (authId == null) localStorage.removeItem("wildland_session"); else localStorage.setItem("wildland_session", String(authId)); } catch (e) {} }, [authId]);
    const pageOwner = authId === PAGE_OWNER_ID;   // maintainer: full rights, invisible in roster
    const me = crew.find(c => c.id === authId && !c.archived) || null;
    const tier = pageOwner ? "owner" : (me ? me.tier : null);
    const canEdit = pageOwner || tier === "owner" || tier === "admin";
    const submitPin = async (entered) => {
      entered = (entered || "").trim();
      if (!entered || !AUTH) { setPinError(true); return; }
      let found = null;
      try {
        const r = await fetch(AUTH + "/auth", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ pin: entered }) });
        if (r.ok) { const j = await r.json(); if (j && j.ok) {
          if (j.id === PAGE_OWNER_ID) found = { id: PAGE_OWNER_ID };
          else { const m = crew.find(c => c.id === j.id) || null; found = (m && !m.archived) ? m : null; }
        } }
      } catch (e) {}
      if (!found) { setPinError(true); return; }
      setAuthId(found.id); setShowPin(false); setPinError(false);
    };

    // ── weather alert polling (banners add-only; page shows verified state) ──
    useEffect(() => {   // burn ban — TFS via worker, hourly
      const f = async () => { try { const r = await fetch(WX + "/burnban"); if (r.ok) setBurnBan(await r.json()); } catch (e) {} };
      f(); const t = setInterval(f, 3600000); return () => clearInterval(t);
    }, []);
    useEffect(() => {   // red flag — NWS via worker, 30 min
      const f = async () => { try { const r = await fetch(WX + "/redflag"); if (r.ok) setRedFlag(await r.json()); } catch (e) {} };
      f(); const t = setInterval(f, 1800000); return () => clearInterval(t);
    }, []);
    useEffect(() => {   // full NWS alert set — fire wx / heat / wind / storm / flood, 30 min
      const f = async () => {
        try {
          const r = await fetch(WX + "/?url=" + encodeURIComponent("https://api.weather.gov/alerts/active?zone=" + NWS_ZONES));
          if (!r.ok) { setAlertsOk(false); return; }
          const data = await r.json();
          if (!data || !Array.isArray(data.features)) { setAlertsOk(false); return; }
          setAlerts(classifyAlerts(data.features)); setAlertsOk(true);
        } catch (e) { setAlertsOk(false); }
      };
      f(); const t = setInterval(f, 1800000); return () => clearInterval(t);
    }, []);

    // ── roster sync ──
    useEffect(() => {
      if (!BACKEND_ON) { setCrew(SEED_ROSTER.map(normalizeMember)); return; }
      const unsub = fsListen(WL_COL, "crew", data => {
        // FAIL LOUD: unreachable backend (undefined) is not an empty doc (null).
        // Never swap in the seed roster or show SYNCED on a failed read.
        if (data === undefined) { setSync("offline"); return; }
        const hasNew = !!(data && data.membersById && typeof data.membersById === "object");
        // SELF-HEAL: keyed map seen this session but now gone → stale client overwrote; re-assert.
        if (sawByIdRef.current && !hasNew && crewRef.current && crewRef.current.length) {
          writeCrewDoc(crewRef.current); setSync("synced"); return;
        }
        let arr = membersToArray(data);
        if (arr.length === 0) {
          arr = SEED_ROSTER.map(normalizeMember);
          // Seed-write ONLY when the doc provably exists and is truly empty. A null/failed
          // read must NEVER author the database (that path once wiped live records).
          const docTrulyEmpty = !!data && !data.membersById;
          if (docTrulyEmpty && !migratedRef.current) { migratedRef.current = true; writeCrewDoc(arr); }
        }
        if (hasNew) sawByIdRef.current = true;
        setCrew(arr); setSync("synced");
      });
      return unsub;
    }, []);

    const saveCrew = async (updated) => {
      // Diff and patch only changed members (atomic field paths — concurrent edits never collide).
      const prev = crewRef.current || [];
      const body = { membersById: {} }; const masks = [];
      updated.forEach(u => {
        const p = prev.find(x => x.id === u.id);
        if (!p || JSON.stringify(memberShape(p)) !== JSON.stringify(memberShape(u))) {
          body.membersById[String(u.id)] = memberShape(u);
          masks.push("membersById." + fpSeg(String(u.id)));
        }
      });
      if (prev.map(c => String(c.id)).join(",") !== updated.map(c => String(c.id)).join(",")) {
        body.memberOrder = updated.map(c => c.id); masks.push("memberOrder");
      }
      if (masks.length === 0) { setCrew(updated); return { ok:true, status:200, detail:"" }; }
      const res = await fsUpdate(WL_COL, "crew", body, masks);
      if (res.ok) { setCrew(updated); setLastErr(""); }
      else setLastErr("Roster save failed (" + res.status + "): " + res.detail);
      return res;
    };

    const now = new Date();
    const shift = todayShift();
    const shiftHue = SHIFT_COLORS[shift].color;
    const dateStr = DAYS_SHORT[now.getDay()] + ", " + MONTHS[now.getMonth()].slice(0,3) + " " + now.getDate();
    const syncColor = sync === "synced" ? C.green : sync === "offline" ? C.red : C.amber;
    const topBtn = (id, label) => h("button", { onClick:() => setTopTab(id),
      style:{ flex:1, padding:"10px 0", fontSize:11, letterSpacing:1, borderRadius:9, border:"1px solid "+(topTab===id?C.accent:C.border), background: topTab===id?"rgba(139,195,74,0.16)":C.panel, color: topTab===id?C.accent:C.dim } }, label);

    const wxBanner = (icon, label, sub, hue, key) => h("div", { key,
      style:{ display:"flex", alignItems:"center", gap:10, background:"linear-gradient(135deg,"+hue+"33,"+hue+"14)", border:"1px solid "+hue+"80", borderRadius:10, padding:"9px 13px", marginBottom:8 } },
      h("span", { style:{ fontSize:16, flexShrink:0 } }, icon),
      h("div", { style:{ minWidth:0 } },
        h("div", { style:{ fontSize:11, fontWeight:700, color:hue, letterSpacing:1.5 } }, label),
        h("div", { style:{ fontSize:9, color:C.dim, letterSpacing:0.5, marginTop:1 } }, sub)));

    return h("div", { style:{ minHeight:"100vh" } },
      h("div", { className:"wl-wrap" },
        // Header
        h("div", { style:{ marginBottom:12 } },
          h("div", { style:{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" } },
            h("div", null,
              h("div", { style:{ fontSize:12, color:C.text, fontWeight:500, letterSpacing:0.5 } }, dateStr),
              h("div", { style:{ display:"flex", alignItems:"center", gap:5, marginTop:4, fontSize:9, color:C.dim, letterSpacing:1 } },
                "TODAY",
                h("span", { style:{ fontSize:10, fontWeight:700, letterSpacing:1, color:shiftHue, background:shiftHue+"22", border:"1px solid "+shiftHue+"55", borderRadius:5, padding:"1px 7px" } }, shift + " SHIFT"))),
            h("div", { style:{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 } },
              (me || pageOwner)
                ? h("div", { style:{ display:"flex", alignItems:"center", gap:6 } },
                    h("span", { style:{ fontSize:11, color:C.text } }, pageOwner ? "Page Admin" : me.name),
                    h("span", { style:{ fontSize:9, letterSpacing:1, padding:"1px 6px", borderRadius:10, border:"1px solid "+C.border, color: canEdit ? C.accent : C.dim } }, canEdit ? "ADMIN" : "STAFF"),
                    h("button", { onClick:() => setAuthId(null), style:{ fontSize:10, color:C.dim, background:"none", border:"none", textDecoration:"underline", padding:0 } }, "Sign Out"))
                : h("button", { onClick:() => { setPinError(false); setShowPin(true); }, style:{ fontSize:11, color:C.accent, background:"rgba(139,195,74,0.12)", border:"1px solid "+C.border, borderRadius:8, padding:"3px 10px" } }, "🔒 Sign In"),
              h("div", { style:{ display:"flex", alignItems:"center", gap:6, fontSize:10, color:C.dim } },
                h("span", { style:{ width:8, height:8, borderRadius:"50%", background:syncColor, display:"inline-block" } }),
                sync === "synced" ? "SYNCED" : sync === "local" ? "LOCAL" : sync === "offline" ? "OFFLINE" : "CONNECTING"))),
          h("img", { src:SHIELD_SRC, alt:"Wildland Ops — BC2FD", style:{ display:"block", width:84, height:84, margin:"6px auto 5px" } }),
          h("div", { style:{ textAlign:"center", fontFamily:"'Bebas Neue', sans-serif", fontSize:25, letterSpacing:2, lineHeight:1, color:C.text } }, "WILDLAND OPS"),
          h("div", { style:{ textAlign:"center", fontSize:9, color:C.accent, letterSpacing:3, marginTop:3 } }, "BC2FD · WILDLAND FIRE CREW")),

        // Backend-not-configured notice — honest state, never a fake synced roster
        !BACKEND_ON ? h("div", { style:{ background:"rgba(255,193,7,0.08)", border:"1px solid rgba(255,193,7,0.35)", borderRadius:10, padding:"8px 12px", marginBottom:10, fontSize:9, color:C.amber, letterSpacing:0.5 } },
          "⚠️ BACKEND NOT CONFIGURED — showing example roster, read-only. See SETUP.md.") : null,

        (BACKEND_ON && sync === "offline") ? h("div", { style:{ background:"rgba(244,67,54,0.08)", border:"1px solid rgba(244,67,54,0.4)", borderRadius:10, padding:"8px 12px", marginBottom:10, fontSize:9, color:C.red, letterSpacing:0.5 } },
          "⚠️ BACKEND UNREACHABLE — roster may be stale; edits will not save. Retrying automatically.") : null,

        // Alert banners — visible on every tab
        (redFlag && redFlag.active) ? wxBanner("🚩", "RED FLAG WARNING", "Extreme fire weather conditions · NWS" + (fmtWxTime(redFlag.updated) ? " · " + fmtWxTime(redFlag.updated) : ""), C.red, "rf") : null,
        (burnBan && burnBan.underBan) ? wxBanner("🔥", "BURN BAN IN EFFECT", "Unincorporated Bexar County · TFS" + (fmtWxTime(burnBan.updated) ? " · " + fmtWxTime(burnBan.updated) : ""), C.fire, "bb") : null,
        alerts.filter(a => a.event !== "Red Flag Warning").map((a, i) =>
          wxBanner(a.group.icon, a.event.toUpperCase(), "Bexar County · until " + fmtUntil(a.ends) + " · NWS", a.group.hue, "al" + i)),
        alertsOk === false ? h("div", { style:{ fontSize:8, color:C.amber, letterSpacing:0.5, marginBottom:8 } }, "⚠️ NWS alert feed unreachable — banners may be incomplete. Verify at weather.gov.") : null,

        // Nav
        h("div", { style:{ display:"flex", gap:6, marginBottom:14 } },
          topBtn("weather", "WEATHER"), topBtn("roster", "ROSTER"), topBtn("equip", "EQUIPMENT"), topBtn("links", "LINKS")),

        topTab === "weather" ? h(WeatherView, { alerts, burnBan, redFlag })
          : topTab === "roster" ? h(RosterView, { crew, canEdit, saveCrew, flash })
          : topTab === "equip" ? h(EquipmentView, { crew })
          : h(LinksView, null),

        lastErr ? h("div", { style:{ marginTop:12, fontSize:10, color:C.red, background:"rgba(255,59,48,0.08)", border:"1px solid rgba(255,59,48,0.35)", borderRadius:8, padding:"8px 10px" } }, lastErr) : null,
        h("div", { style:{ textAlign:"center", fontSize:8, color:C.dim, letterSpacing:1, marginTop:24 } }, "WILDLAND OPS v1.0 · BC2FD")),

      toast ? h("div", { style:{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:C.panel2, border:"1px solid "+C.border, borderRadius:10, padding:"9px 16px", fontSize:11, zIndex:90 } }, toast) : null,
      showPin ? h(PinModal, { onSubmit: submitPin, onClose:() => setShowPin(false), error: pinError }) : null);
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>
</body>
</html>
